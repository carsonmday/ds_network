            hosts:
                sb_1:
                    ansible_host: 10.1.10.51
                    host_name: sb_1
                sb_2:
                    ansible_host: 10.1.10.52
                    host_name: sb_2
                sb_3:
                    ansible_host: 10.1.10.53
                    host_name: sb_3
                sb_4:
                    ansible_host: 10.1.10.54
                    host_name: sb_4
                sb_5:
                    ansible_host: 10.1.10.55
                    host_name: sb_5

    vars:
        ansible_connection: ansible.netcommon.network_cli
        ansible_network_os: cisco.ios.ios
        ansible_user: "{{ ansible_user }}"
        ansible_password: "{{ ansible_password }}"
        ansible_become: true
        ansible_become_method: enable
        ansible_become_password: "{{ enable_password }}"
        ptp_domain: 0  # 0-255
        ptp_profile: power  # default,power,power-2017
