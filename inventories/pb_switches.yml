---

switches:
    children:
        pb_prpa_switches:
            hosts:
                pb_prp_a1:
                    ansible_host: 10.1.10.31
                    host_name: pb_prp_a1
                pb_prp_a2:
                    ansible_host: 10.1.10.32
                    host_name: pb_prp_a2
                pb_prp_a3:
                    ansible_host: 10.1.10.33
                    host_name: pb_prp_a3
                pb_prp_a4:
                    ansible_host: 10.1.10.34
                    host_name: pb_prp_a4
                pb_prp_a5:
                    ansible_host: 10.1.10.35
                    host_name: pb_prp_a5
        prpb_switches:
            hosts:
                pb_prp_b1:
                    ansible_host: 10.1.10.41
                    host_name: pb_prp_b1
                pb_prp_b2:
                    ansible_host: 10.1.10.42
                    host_name: pb_prp_b2
                pb_prp_b3:
                    ansible_host: 10.1.10.43
                    host_name: pb_prp_b3
                pb_prp_b4:
                    ansible_host: 10.1.10.44
